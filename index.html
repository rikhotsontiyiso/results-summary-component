</head>
<body>

  <div class="outer-container">
    <div class="result-container">
      <h2 class="your-result">Your Result</h2>

      <div class="percentage">
        <p class="numerator">76</p>
        <p class="denominator">of 100</p>
      </div>

      <div class="evaluation">
        <p class="performance">Great</p>
        <p class="feedback">You scored higher than 65% of the people who have taken these tests.</p>
      </div>
    </div>

    <div class="summary-container">
      <h2 class="summary-heading">Summary</h2>
      <div class="stats-container reaction-pill">
        <div class="reaction-container">
          <img class="summary-img" src="./assets/images/icon-reaction.svg" alt="An icon for a reaction">
          <span class="reaction">Reaction</span>
        </div>

        <div class="score-container">
          <span class="summary-numerator">80</span>
          <span class="summary-denominator">/ 100</span>
        </div>
      </div>

      <div class="stats-container memory-pill">
        <div class="memory-container">
          <img class="summary-img" src="./assets/images/icon-memory.svg" alt="An icon for memory">
          <span class="memory">Memory</span>
        </div>

        <div class="score-container">
          <span class="summary-numerator">92</span>
          <span class="summary-denominator">/ 100</span>
        </div>
      </div>

      <div class="stats-container verbal-pill">
        <div class="memory-container">
          <img class="summary-img" src="./assets/images/icon-verbal.svg" alt="An icon for verbal">
          <span class="verbal">Verbal</span>
        </div>

        <div class="score-container">
          <span class="summary-numerator">61</span>
          <span class="summary-denominator">/ 100</span>
        </div>
      </div>

      <div class="stats-container visual-pill">
        <div class="memory-container">
          <img class="summary-img" src="./assets/images/icon-visual.svg" alt="An icon for visual">
          <span class="visual">Visual</span>
        </div>

        <div class="score-container">
          <span class="summary-numerator">73</span>
          <span class="summary-denominator">/ 100</span>
        </div>
      </div>

      <button>Continue</button>
    </div>
  </div>
  


  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Ntiyiso</a>.
  </footer>
</body>
